<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tech Talent Solutions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3 text-white" href="#">
            Tech Talent Solutions
        </a>
    </div>
</nav>


<!-- ================= HERO SECTION ================= -->
<section class="hero-section text-white d-flex align-items-center">
    <div class="container text-center">
        <h1 class="display-4 fw-bold">
            Empowering Careers with Future Technologies
        </h1>
        <p class="lead mt-3">
            Industry-focused training programs designed to make you job-ready
        </p>
        <a href="#courses" class="btn btn-warning btn-lg mt-3 px-4 shadow">
            Explore Courses
        </a>
    </div>
</section>


<!-- ================= COURSES ================= -->
<section id="courses" class="py-5 bg-light">
    <div class="container">
        <h2 class="text-center fw-bold mb-5 text-primary">
            Our Trending Courses
        </h2>

        <div class="row" id="courseList">
            <!-- JS will load course cards here -->
        </div>
    </div>
</section>


<!-- ================= REQUEST FORM ================= -->
<section id="requestSection" class="request-section py-5">
    <div class="container">
        <h2 class="text-center fw-bold mb-4 text-white">
            Request Course Information
        </h2>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg p-4 rounded-4">

                    <form id="requestForm">

                        <div class="mb-3">
                            <input type="text"
                                   class="form-control form-control-lg"
                                   id="name"
                                   placeholder="Full Name"
                                   required>
                        </div>

                        <div class="mb-3">
                            <input type="email"
                                   class="form-control form-control-lg"
                                   id="email"
                                   placeholder="Email Address"
                                   required>
                        </div>

                        <div class="mb-3">
                            <input type="text"
                                   class="form-control form-control-lg"
                                   id="phone"
                                   placeholder="Phone Number"
                                   required>
                        </div>

                        <div class="mb-3">
                            <select class="form-select form-select-lg"
                                    id="course"
                                    required>
                                <option value="">Select Course</option>
                            </select>
                        </div>

                        <button type="submit"
                                class="btn btn-primary btn-lg w-100">
                            Submit Request
                        </button>

                    </form>

                    <div id="message"
                         class="mt-3 text-success text-center fw-semibold">
                    </div>

                </div>
            </div>
        </div>
    </div>
</section>


<!-- ================= FOOTER ================= -->
<footer class="bg-dark text-white text-center py-3">
    © 2026 Tech Talent Solutions | All Rights Reserved <br>
    <strong>By Ram Mohan Mudegedu</strong>
</footer>


<!-- ================= JS ================= -->
<script src="js/script.js"></script>

</body>
</html>
